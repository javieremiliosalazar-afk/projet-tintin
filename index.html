<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebAR Treasure Hunt</title>

  <!-- A-Frame + 8th Wall compatible -->
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>

  <style>
    body { margin: 0; overflow: hidden; }
    #ui {
      position: fixed;
      top: 10px;
      left: 10px;
      background: rgba(0,0,0,0.6);
      color: white;
      padding: 10px;
      border-radius: 10px;
      font-family: sans-serif;
    }
  </style>
</head>

<body>

<div id="ui">
  <div>🎯 Jeu de piste AR</div>
  <div id="status">Recherche GPS...</div>
  <div id="step">Étape: 0</div>
</div>

<a-scene embedded vr-mode-ui="enabled: false">
  
  <!-- Caméra -->
  <a-camera position="0 1.6 0"></a-camera>

  <!-- Cube AR -->
  <a-box 
    id="cube"
    position="0 0 -3"
    color="red"
    visible="false"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
  </a-box>

</a-scene>

<script>
/* =========================
   CONFIGURATION DU JEU
========================= */

const checkpoints = [
  {
    name: "Point 1",
    lat: 50.8466,
    lon: 4.3528,
    radius: 25
  },
  {
    name: "Point 2",
    lat: 50.8455,
    lon: 4.3600,
    radius: 25
  }
];

let currentStep = 0;
let cubeVisible = false;

/* =========================
   DISTANCE GPS
========================= */

function getDistance(lat1, lon1, lat2, lon2) {
  const R = 6371e3;
  const φ1 = lat1 * Math.PI/180;
  const φ2 = lat2 * Math.PI/180;
  const Δφ = (lat2-lat1) * Math.PI/180;
  const Δλ = (lon2-lon1) * Math.PI/180;

  const a =
    Math.sin(Δφ/2) * Math.sin(Δφ/2) +
    Math.cos(φ1) * Math.cos(φ2) *
    Math.sin(Δλ/2) * Math.sin(Δλ/2);

  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));

  return R * c;
}

/* =========================
   LOGIQUE DE JEU
========================= */

function checkCheckpoint(lat, lon) {
  if (currentStep >= checkpoints.length) {
    document.getElementById("status").innerText = "🎉 Jeu terminé !";
    return;
  }

  const point = checkpoints[currentStep];
  const distance = getDistance(lat, lon, point.lat, point.lon);

  document.getElementById("status").innerText =
    `Distance: ${Math.round(distance)} m`;

  if (distance < point.radius && !cubeVisible) {
    spawnCube(point.name);
  }
}

function spawnCube(name) {
  const cube = document.querySelector('#cube');
  cube.setAttribute('visible', 'true');
  cubeVisible = true;

  document.getElementById("status").innerText =
    `✅ ${name} trouvé !`;

  setTimeout(() => {
    cube.setAttribute('visible', 'false');
    cubeVisible = false;
    currentStep++;

    document.getElementById("step").innerText =
      `Étape: ${currentStep}`;

  }, 4000);
}

/* =========================
   GPS TRACKING
========================= */

if ("geolocation" in navigator) {

  navigator.geolocation.watchPosition(
    (position) => {
      const lat = position.coords.latitude;
      const lon = position.coords.longitude;

      console.log("Position:", lat, lon);

      checkCheckpoint(lat, lon);
    },
    (error) => {
      document.getElementById("status").innerText =
        "❌ GPS refusé ou indisponible";
      console.error(error);
    },
    {
      enableHighAccuracy: true,
      maximumAge: 1000,
      timeout: 5000
    }
  );

} else {
  alert("Geolocation non supportée");
}

</script>

</body>
</html>
