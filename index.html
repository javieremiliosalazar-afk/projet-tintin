<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebAR ElevenLabs</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

  <!-- Animation mixer -->
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Bouton -->
  <button id="talkBtn">🎤 Parler</button>

  <!-- Scène AR -->
  <a-scene embedded>

    <!-- Lumière -->
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 2 1"></a-light>

    <!-- Caméra -->
    <a-camera position="0 1.6 3"></a-camera>

    <!-- Modèle GLB -->
    <a-entity
      id="model"
      gltf-model="url(model.glb)"
      position="0 0 -2"
      scale="1 1 1"
      animation-mixer
    ></a-entity>

  </a-scene>

  <!-- JS -->
  <script src="main.js"></script>

</body>
</html>
