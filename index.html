<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>WebAR + ElevenLabs</title>
  <link rel="stylesheet" href="style.css">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
</head>

<body>

  <!-- Bouton UI -->
  <button id="voiceBtn">🎤 Parler</button>

  <!-- Scène AR -->
  <a-scene embedded>
    
    <!-- Assets -->
    <a-assets>
      <a-asset-item id="model" src="model.glb"></a-asset-item>
    </a-assets>

    <!-- Caméra -->
    <a-camera position="0 1.6 3"></a-camera>

    <!-- Personnage -->
    <a-entity 
      gltf-model="#model"
      position="0 0 -3"
      scale="1 1 1">
    </a-entity>

  </a-scene>

  <script src="main.js"></script>
</body>
</html>
