<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Prototype Jeu de Piste AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body style="margin: 0; overflow: hidden;">

    <div id="ui-container">
        
        <button id="btn-openai" class="ui-element" onclick="startVoice()">🎙️ Parler</button>

        <div id="menu-wrapper" class="ui-element">
            <button id="menu-btn" onclick="toggleMenu()">☰ Menu</button>
            <div id="menu-content" class="hidden">
                <p>📍 Objectif : Retrouver le Totem</p>
                <hr>
                <button onclick="requestPermissions()">Activer Boussole</button>
            </div>
        </div>

        <div id="item-counter" class="ui-element">
            Objets : <span id="count">0</span>
        </div>

        <div id="compass-container" class="ui-element">
            <div id="compass-arrow">⬆️</div>
        </div>
        
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false;" cursor="fuse: false; rayOrigin: mouse">
        
        <a-entity id="character" 
                  geometry="primitive: cylinder; height: 1.5; radius: 0.5" 
                  material="color: #FF5733; opacity: 0.8"
                  position="0 0.75 -5">
        </a-entity>

        <a-box id="collectible" 
               position="2 0.5 -3" 
               scale="0.4 0.4 0.4" 
               color="gold"
               animation="property: rotation; to: 0 360 0; loop: true; dur: 3000"
               class="clickable"
               onclick="collectItem()">
        </a-box>

        <a-entity camera></a-entity>
    </a-scene>

    <script>
        // --- LOGIQUE DE JEU ---
        let items = 0;
        const targetCoords = { lat: 48.8584, lon: 2.2945 }; // Exemple: Tour Eiffel

        function collectItem() {
            items++;
            document.getElementById('count').innerText = items;
            const obj = document.getElementById('collectible');
            obj.setAttribute('visible', 'false');
            alert("Objet récupéré ! L'IA va vous guider vers le suivant.");
        }

        function toggleMenu() {
            document.getElementById('menu-content').classList.toggle('hidden');
        }

        function startVoice() {
            const btn = document.getElementById('btn-openai');
            btn.innerText = "⌛ Écoute...";
            setTimeout(() => { btn.innerText = "🎙️ Parler"; }, 3000);
            console.log("Appel API OpenAI Whisper simulé...");
        }

        // --- LOGIQUE BOUSSOLE & GPS ---
        function calculateBearing(lat1, lon1, lat2, lon2) {
            const toRad = (v) => v * Math.PI / 180;
            const toDeg = (v) => v * 180 / Math.PI;
            const φ1 = toRad(lat1), φ2 = toRad(lat2);
            const Δλ = toRad(lon2 - lon1);
            const y = Math.sin(Δλ) * Math.cos(φ2);
            const x = Math.cos(φ1) * Math.sin(φ2) - Math.sin(φ1) * Math.cos(φ2) * Math.cos(Δλ);
            return (toDeg(Math.atan2(y, x)) + 360) % 360;
        }

        function updateCompass() {
            navigator.geolocation.watchPosition((position) => {
                const userLat = position.coords.latitude;
                const userLon = position.coords.longitude;
                const userHeading = position.coords.heading || 0; 
                
                const bearing = calculateBearing(userLat, userLon, targetCoords.lat, targetCoords.lon);
                const arrowRotation = bearing - userHeading;

                document.getElementById('compass-arrow').style.transform = `rotate(${arrowRotation}deg)`;
            }, (err) => console.log(err), { enableHighAccuracy: true });
        }

        // Gestion des permissions (Nécessaire pour iOS)
        function requestPermissions() {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission()
                    .then(response => {
                        if (response == 'granted') {
                            window.addEventListener('deviceorientation', (e) => {}, true);
                            updateCompass();
                        }
                    });
            } else {
                updateCompass();
            }
        }
    </script>
</body>
</html>
