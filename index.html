<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>AR Game Prototype</title>
    <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui-container">
        
        <button id="btn-openai" class="ui-element" onclick="startVoice()">🎙️ Parler</button>

        <div id="menu-wrapper" class="ui-element">
            <button id="menu-btn" onclick="toggleMenu()">☰ Menu</button>
            <div id="menu-content" class="hidden">
                <p>🎯 Chercher le signal</p>
                <hr>
                <button onclick="requestPermissions()">Activer Boussole</button>
            </div>
        </div>

        <div id="item-counter" class="ui-element">
            Objets : <span id="count">0</span>
        </div>

        <div id="compass-container" class="ui-element">
            <div id="compass-arrow">⬆️</div>
        </div>

        <div id="instruction-overlay">Scannez le sol et cliquez pour poser le personnage</div>
    </div>

    <a-scene 
        webxr="requiredFeatures: hit-test, local-floor; optionalFeatures: dom-overlay; overlayElement: #ui-container;"
        renderer="antialias: true; alpha: true;">
        
        <a-assets>
            </a-assets>

        <a-entity id="reticle" raycaster="objects: .none">
            <a-ring color="#00ffcc" rotation="-90 0 0" radius-inner="0.05" radius-outer="0.08"></a-ring>
        </a-entity>

        <a-entity id="character" 
                  geometry="primitive: cylinder; height: 1.2; radius: 0.4" 
                  material="color: #FF5733; emissive: #330000"
                  visible="false">
            <a-circle rotation="-90 0 0" radius="0.5" material="shader: flat; color: black; opacity: 0.3" position="0 -0.59 0"></a-circle>
        </a-entity>

        <a-entity camera position="0 1.6 0"></a-entity>
    </a-scene>

    <script>
        let items = 0;
        const scene = document.querySelector('a-scene');
        const reticle = document.querySelector('#reticle');
        const character = document.querySelector('#character');
        const instruction = document.querySelector('#instruction-overlay');

        // --- LOGIQUE DE PLACEMENT AU SOL ---
        scene.addEventListener('enter-vr', () => {
            if (scene.is('ar-mode')) {
                instruction.style.display = 'block';
            }
        });

        // Utilisation du système Hit-Test de WebXR
        scene.addEventListener('click', (event) => {
            if (character.getAttribute('visible') === 'false' && reticle.getAttribute('visible') === 'true') {
                const position = reticle.getAttribute('position');
                character.setAttribute('position', position);
                character.setAttribute('visible', 'true');
                instruction.style.display = 'none';
                
                // Animation d'apparition
                character.setAttribute('animation', 'property: scale; from: 0 0 0; to: 1 1 1; dur: 500; easing: easeOutBack');
            } else {
                // Si le perso est déjà là, on simule une collecte
                items++;
                document.getElementById('count').innerText = items;
            }
        });

        // --- UI & MENUS ---
        function toggleMenu() {
            document.getElementById('menu-content').classList.toggle('hidden');
        }

        function startVoice() {
            const btn = document.getElementById('btn-openai');
            btn.classList.add('listening');
            btn.innerText = "⌛ Écoute...";
            setTimeout(() => { 
                btn.classList.remove('listening');
                btn.innerText = "🎙️ Parler"; 
            }, 3000);
        }

        // --- BOUSSOLE (LOGIQUE SIMPLIFIÉE) ---
        function requestPermissions() {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(res => {
                    if (res === 'granted') window.addEventListener('deviceorientation', handleOrientation);
                });
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        function handleOrientation(event) {
            const heading = event.webkitCompassHeading || 360 - event.alpha;
            document.getElementById('compass-arrow').style.transform = `rotate(${heading}deg)`;
        }
    </script>
</body>
</html>
