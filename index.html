<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Jeu de piste AR</title>

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.4.1/aframe.min.js"></script>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- UI -->
<div id="ui">
  <div>🎯 Jeu de piste AR</div>
  <div id="status">Clique sur START</div>
  <div id="step">Étape: 0</div>
  <div id="button" onclick="startGPS()">▶ START GPS</div>
</div>

<!-- SCÈNE AR -->
<a-scene embedded background="color: #111">

  <a-camera position="0 1.6 0"></a-camera>

  <a-box 
    id="cube"
    position="0 0 -3"
    color="red"
    visible="false"
    animation="property: rotation; to: 0 360 0; loop: true; dur: 4000">
  </a-box>

</a-scene>

<!-- JS -->
<script src="main.js"></script>

</body>
</html>
