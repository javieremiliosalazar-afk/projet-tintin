<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>WebAR Assistant</title>
  <link rel="stylesheet" href="style.css" />

  <!-- Three.js via Import Map -->
  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <!-- ElevenLabs ConvAI Widget -->
  <script src="https://elevenlabs.io/convai-widget/index.js" async></script>
</head>
<body>

  <!-- Canvas WebXR -->
  <canvas id="ar-canvas"></canvas>

  <!-- Overlay UI -->
  <div id="overlay">

    <!-- Header -->
    <div id="header">
      <span id="logo">◈ WebAR</span>
      <span id="status-badge">
        <span id="status-dot"></span>
        <span id="status-text">Prêt</span>
      </span>
    </div>

    <!-- Bouton Start AR -->
    <div id="ar-button-container"></div>

    <!-- Indication placement -->
    <div id="placement-hint" class="hidden">
      <span>↕ Déplacez l'appareil pour détecter une surface, puis appuyez pour placer</span>
    </div>

    <!-- Footer -->
    <div id="footer">
      <span>ElevenLabs ConvAI · WebXR AR · Three.js r160</span>
    </div>

  </div>

  <!-- ElevenLabs Widget — remplacez VOTRE_AGENT_ID -->
  <elevenlabs-convai agent-id="VOTRE_AGENT_ID"></elevenlabs-convai>

  <script type="module" src="main.js"></script>
</body>
</html>
