<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Modèle en AR - Three.js</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { ARButton } from 'three/addons/webxr/ARButton.js'; // CHANGÉ : ARButton

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

        // MODIFIÉ : alpha: true pour voir la caméra derrière le modèle
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.xr.enabled = true; 
        document.body.appendChild(renderer.domElement);

        // AJOUTÉ : Bouton Start AR
        document.body.appendChild(ARButton.createButton(renderer));

        // LUMIÈRES
        const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
        scene.add(light);

        // CHARGEMENT DU MODÈLE
loader.load('assets/model2.glb', function (gltf) {
    const model = gltf.scene;
    
    // Alerte pour confirmer que le fichier est bien trouvé par le téléphone
    console.log("Modèle chargé !"); 

    // Rendre le modèle translucide comme tu voulais
    model.traverse((child) => {
        if (child.isMesh) {
            child.material.transparent = true;
            child.material.opacity = 0.5;
        }
    });

    // Échelle : Si le perso fait 1m dans Blender, 0.2 le rend minuscule (20cm).
    // Teste avec 1, 1, 1 pour voir s'il apparaît enfin.
    model.scale.set(1, 1, 1); 
    model.position.set(0, 0, -2); // 2 mètres devant
    
    scene.add(model);
}, 
// Fonction de progression (optionnel)
undefined, 
// Fonction d'erreur : TRÈS IMPORTANT
function (error) {
    console.error("Erreur de chargement :", error);
    alert("Erreur de chargement du GLB : " + error.message);
});

        // BOUCLE D'ANIMATION
        renderer.setAnimationLoop(function () {
            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
