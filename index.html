<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tintin WebXR - Agent Conversationnel</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Script ElevenLabs ConvAI -->
    <script src="https://elevenlabs.io/convai-widget/index.js" async type="text/javascript"></script>

    <!-- Import Map pour Three.js -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <!-- Landing Page -->
    <div id="landing-page">
        <div class="landing-content">
            <h1>Expérience Tintin IA</h1>
            <p>Placez Tintin dans votre environnement et discutez avec lui.</p>
            <!-- Le bouton AR généré par Three.js viendra s'insérer ici -->
            <div id="ar-button-container"></div>
        </div>
    </div>

    <!-- Interface utilisateur superposée en AR (DOM Overlay) -->
    <div id="ar-overlay">
        <!-- Bouton Parler -->
        <button id="talk-btn" style="display: none;">Parler à Tintin</button>

        <!-- Widget ElevenLabs (caché par défaut) -->
        <div id="eleven-widget-container" class="hidden">
            <!-- REMPLACE PAR TON AGENT ID -->
            <elevenlabs-convai agent-id="agent_6201kncf8mfdey5s99wfnbgp952a"></elevenlabs-convai>
        </div>
    </div>

    <!-- Script principal -->
    <script type="module" src="main.js"></script>
</body>
</html>
