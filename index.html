<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, user-scalable=no"
  />

  <title>BD XR Experience</title>

  <link rel="stylesheet" href="./style.css" />

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
    }
  }
  </script>
</head>

<body>

  <!-- LANDING PAGE -->
  <div id="landing">

    <div class="comic-panel">

      <div class="comic-bubble">
        Une aventure XR incroyable !
      </div>

      <h1>
        BD XR
      </h1>

      <p>
        Placez un personnage animé dans votre environnement
        et discutez avec lui grâce à l'IA vocale.
      </p>

      <button id="enterButton">
        Entrer dans l'expérience
      </button>

      <div class="instructions">
        📱 Smartphone compatible WebXR requis
      </div>

    </div>

  </div>

  <!-- UI XR -->
  <button id="talkButton">
    Parler
  </button>

  <div id="scanText">
    Déplacez votre téléphone pour détecter une surface...
  </div>

  <script type="module" src="./main.js"></script>

</body>
</html>
