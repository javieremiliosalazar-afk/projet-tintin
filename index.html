<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Modèle en VR - Three.js</title>
    <style>
        body { margin: 0; background-color: #111; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
        import { VRButton } from 'three/addons/webxr/VRButton.js'; // AJOUTÉ : Import du bouton VR

        // --- CONFIGURATION DE BASE ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x333333);

        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        // Position de la caméra à hauteur d'homme (environ 1.6m) pour la VR
        camera.position.set(0, 1.6, 3); 

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.toneMapping = THREE.ACESFilmicToneMapping;
        
        // AJOUTÉ : Activer le support WebXR
        renderer.xr.enabled = true; 
        
        document.body.appendChild(renderer.domElement);

        // AJOUTÉ : Ajouter le bouton "Enter VR" sur la page
        document.body.appendChild(VRButton.createButton(renderer));

        // --- LUMIÈRES ---
        const ambientLight = new THREE.AmbientLight(0xffffff, 1);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 2);
        sunLight.position.set(5, 5, 5);
        scene.add(sunLight);

        // --- CONTRÔLES (Souris/Tactile pour le mode non-VR) ---
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;

        // --- CHARGEMENT DU MODÈLE ---
        const loader = new GLTFLoader();

        loader.load('assets/model.glb', function (gltf) {
            const model = gltf.scene;
            scene.add(model);
            
            const box = new THREE.Box3().setFromObject(model);
            const center = box.getCenter(new THREE.Vector3());
            model.position.sub(center); 

            console.log("Modèle chargé avec succès !");
        }, undefined, function (error) {
            console.error("Erreur lors du chargement :", error);
        });

        // --- BOUCLE D'ANIMATION (MODIFIÉE POUR LA VR) ---
        // En WebXR, on n'utilise plus requestAnimationFrame, 
        // mais renderer.setAnimationLoop
        renderer.setAnimationLoop(function () {
            controls.update(); // Utile uniquement en mode écran
            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
