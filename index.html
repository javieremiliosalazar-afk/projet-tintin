<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Modèle en AR - Three.js</title>
    <style>
        body { margin: 0; }
        canvas { display: block; }
    </style>
</head>
<body>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
        import { ARButton } from 'three/addons/webxr/ARButton.js'; // CHANGÉ : ARButton

        const scene = new THREE.Scene();

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

        // MODIFIÉ : alpha: true pour voir la caméra derrière le modèle
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.xr.enabled = true; 
        document.body.appendChild(renderer.domElement);

        // AJOUTÉ : Bouton Start AR
        document.body.appendChild(ARButton.createButton(renderer));

        // LUMIÈRES
        const light = new THREE.HemisphereLight(0xffffff, 0xbbbbff, 1);
        scene.add(light);

        // CHARGEMENT DU MODÈLE
        const loader = new GLTFLoader();
        loader.load('assets/model2.glb', function (gltf) {
            const model = gltf.scene;
            
            // CONSEIL AR : Les modèles sont souvent trop grands. 
            // On les réduit pour qu'ils tiennent sur une table.
            model.scale.set(0.2, 0.2, 0.2); 
            model.position.set(0, 0, -1); // Placé à 1 mètre devant l'utilisateur
            
            scene.add(model);
        });

        // BOUCLE D'ANIMATION
        renderer.setAnimationLoop(function () {
            renderer.render(scene, camera);
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

    </script>
</body>
</html>
